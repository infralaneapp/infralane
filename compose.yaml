services:
  db:
    image: postgres:16-alpine
    container_name: infralane-db
    environment:
      POSTGRES_DB: infralane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infralane"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: infralane-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/infralane
      # DEV ONLY — do not use this secret in production. Generate a random 32+ char secret instead.
      INFRALANE_SESSION_SECRET: "a3f8c2e9d4b7f1e6a0c5d8b3e7f2a4c9d6e1b8f3a7c0d5e2b9f4a1c6d3e8b5"
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      AUTOMATION_WORKER_SECRET: "dev-automation-worker-secret"
      INFRALANE_BASE_URL: "http://localhost:3000"
      SLACK_CLIENT_ID: ""
      SLACK_CLIENT_SECRET: ""
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    command: sh /app/docker/start-dev.sh

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: infralane-worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/infralane
      INFRALANE_WORKER_MODE: external
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: npx tsx worker.ts
    restart: unless-stopped

volumes:
  postgres_data:
  app_node_modules:
  app_next:
